<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Shuffle Sort | Kaan Yıldırım</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
      :root {
        --bg-dark: #0f172a;
        --bg-card: #1e293b;
        --primary: #38bdf8;
        --secondary: #818cf8;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }

      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        line-height: 1.6;
      }

      h1, h2, h3 { font-family: "Space Grotesk", sans-serif; font-weight: 700; }
      a { text-decoration: none; color: inherit; transition: all 0.3s; }

      nav {
        position: fixed;
        top: 0; left: 0; width: 100%;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        padding: 1rem 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }

      .nav-logo { font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 1.1rem; }
      .nav-logo span { color: var(--primary); }

      .nav-back {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .nav-back:hover { color: var(--primary); }

      /* HERO */
      .project-hero {
        min-height: 55vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding-top: 80px;
        position: relative;
        overflow: hidden;
      }

      .project-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(129,140,248,0.1) 0%, transparent 70%);
        pointer-events: none;
      }

      .project-hero::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      .hero-inner {
        position: relative;
        z-index: 1;
        padding: 0 24px;
        animation: fadeInUp 0.8s ease-out both;
      }

      .hero-grid {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr 1.1fr;
        gap: 56px;
        align-items: center;
        max-width: 1100px;
        width: 100%;
        padding: 120px 6% 70px;
        animation: fadeInUp 0.8s ease-out both;
      }

      .hero-left { text-align: left; }
      .hero-left .project-icon { margin-bottom: 1.2rem; }
      .hero-left .sub { margin: 0 0 2rem; max-width: 420px; }
      .hero-left .hero-btns { justify-content: flex-start; }

      .hero-right { width: 100%; }
      .hero-right .section-label { margin-bottom: 1.2rem; }
      .hero-right .feature-grid { margin-top: 0; grid-template-columns: 1fr 1fr; }

      @media (max-width: 820px) {
        .hero-grid { grid-template-columns: 1fr; gap: 36px; }
        .hero-left { text-align: center; }
        .hero-left .hero-btns { justify-content: center; }
        .hero-left .sub { margin-left: auto; margin-right: auto; }
      }

      @media (max-width: 480px) {
        .hero-right .feature-grid { grid-template-columns: 1fr; }
      }

      .project-icon {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 24px;
        margin-bottom: 1.5rem;
        box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        border: 2px solid rgba(255,255,255,0.08);
      }

      .project-hero h1 {
        font-size: clamp(2.2rem, 5vw, 3.5rem);
        margin-bottom: 0.75rem;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .project-hero .sub {
        font-size: 1.1rem;
        color: var(--text-muted);
        max-width: 520px;
        margin: 0 auto 2rem;
      }

      .tag-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }

      .tag {
        font-size: 0.8rem;
        color: var(--secondary);
        background: rgba(129,140,248,0.1);
        padding: 5px 14px;
        border-radius: 20px;
        border: 1px solid rgba(129,140,248,0.2);
      }

      .hero-btns {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 26px;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        color: #fff;
        border-radius: 50px;
        font-weight: 600;
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.3s;
      }

      .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 28px -8px rgba(129,140,248,0.5); }

      .btn-outline {
        background: transparent;
        border: 2px solid rgba(129,140,248,0.4);
        color: var(--secondary);
      }

      .btn-outline:hover { border-color: var(--secondary); background: rgba(129,140,248,0.07); }

      /* CONTENT */
      .content-section { padding: 70px 10%; max-width: 1100px; margin: 0 auto; }

      .section-label {
        font-size: 0.8rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--secondary);
        margin-bottom: 0.75rem;
      }

      .content-section h2 { font-size: 1.8rem; margin-bottom: 1.2rem; }

      .content-section p {
        color: var(--text-muted);
        font-size: 1rem;
        max-width: 700px;
        margin-bottom: 16px;
      }

      /* FEATURE CARDS */
      .feature-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 2rem;
      }

      .feature-card {
        background: var(--bg-card);
        padding: 24px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.05);
        transition: border-color 0.3s, transform 0.3s;
      }

      .feature-card:hover { border-color: rgba(129,140,248,0.3); transform: translateY(-4px); }

      .feature-card i {
        font-size: 1.6rem;
        color: var(--secondary);
        margin-bottom: 12px;
        display: block;
      }

      .feature-card h4 { margin-bottom: 6px; font-size: 1rem; }
      .feature-card p { font-size: 0.88rem; color: var(--text-muted); margin: 0; }

      /* DIVIDER */
      .divider {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.06);
        margin: 0 10%;
      }

      /* FOOTER */
      footer {
        text-align: center;
        padding: 32px 5%;
        background: #080f1e;
        color: var(--text-muted);
        font-size: 0.85rem;
        border-top: 1px solid rgba(255,255,255,0.05);
        margin-top: 60px;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .reveal {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.7s ease-out, transform 0.7s ease-out;
      }

      .reveal.active { opacity: 1; transform: translateY(0); }

      @media (max-width: 600px) {
        .content-section { padding: 50px 6%; }
        .divider { margin: 0 6%; }
      }
    </style>
  </head>

  <body>
    <nav>
      <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
    </nav>

    <!-- HERO -->
    <section class="project-hero">
      <div class="hero-grid">
        <!-- LEFT -->
        <div class="hero-left">
          <img src="assets/icons/card-shuffle-sort.png" alt="Card Shuffle Sort" class="project-icon"
            onerror="this.style.display='none'">
          <h1>Card Shuffle Sort</h1>
          <div class="hero-btns">
            <a href="https://play.google.com/store/apps/details?id=com.MachinaGames.CardQuest" target="_blank" class="btn"><i class="fab fa-google-play"></i> Google Play</a>
            <a href="https://apps.apple.com/us/app/card-shuffle-sort/id1666903635?platform=ipad" target="_blank" class="btn btn-outline"><i class="fab fa-app-store-ios"></i> App Store</a>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p><a href="index.html" style="color: var(--secondary);"><i class="fas fa-arrow-left"></i> Back to Portfolio</a></p>
    </footer>

    <script>
      const reveals = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); });
      }, { threshold: 0.1 });
      reveals.forEach(r => observer.observe(r));
    </script>
  </body>
</html>
